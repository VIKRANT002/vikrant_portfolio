<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
padding:60px 8%;
}

.title{
text-align:center;
margin-bottom:60px;
}

.title h1{
font-size:70px;
}

.title span{
color:#f5b041;
}

.title p{
color:#cfcfcf;
margin-top:15px;
font-size:20px;
}

.contact-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.contact-card{
background:#1a1a1a;
padding:40px;
border-radius:20px;
border:1px solid #333;
transition:0.3s;
text-align:center;
}

.contact-card:hover{
transform:translateY(-8px);
border-color:#f5b041;
}

.icon{
font-size:55px;
margin-bottom:20px;
}

.contact-card h2{
font-size:32px;
margin-bottom:15px;
}

.contact-card p{
color:#cfcfcf;
margin-bottom:20px;
line-height:1.7;
}

.contact-card a{
display:inline-block;
padding:12px 25px;
background:#f5b041;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="title">

<h1>
Contact <span>Me</span>
</h1>

<p>
Let's work together on your next project
</p>

</div>

<div class="contact-container">

<!-- EMAIL -->

<div class="contact-card">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" width="60">
</div>

<h2>Email</h2>

<p>
For freelance projects and collaborations
contact me via email.
</p>

<a href="mailto:vikrant.animation02@gmail.com">
Send Email
</a>

</div>

<!-- INSTAGRAM -->

<div class="contact-card">

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="60">
</div>

<h2>Instagram</h2>

<p>
Check my latest work and connect with me
on Instagram.
</p>

<a href="https://instagram.com/vikrant_y08" target="_blank">
Open Instagram
</a>

</div>
