<!-- FILE: three-d.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Projects</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f0f0f;
  color:white;
  padding:50px 8%;
}

.title{
  text-align:center;
  margin-bottom:60px;
}

.title h1{
  font-size:60px;
}

.title span{
  color:#f5b041;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:30px;
}

.project-card{
  background:#1a1a1a;
  border-radius:20px;
  overflow:hidden;
  border:1px solid #333;
}

.project-card img{
  width:100%;
  display:block;
}

.project-info{
  padding:20px;
}

.project-info h2{
  margin-bottom:10px;
}

.project-info p{
  color:#cfcfcf;
}

</style>

</head>

<body>

<div class="title">

<h1>
3D <span>Projects</span>
</h1>

</div>

<div class="gallery">

<div class="project-card">

<img src="https://via.placeholder.com/600x400">

<div class="project-info">

<h2>Interior Render</h2>

<p>Modern cafe interior visualization.</p>

</div>

</div>

<div class="project-card">

<img src="https://via.placeholder.com/600x400">

<div class="project-info">

<h2>Product Render</h2>

<p>Realistic product rendering project.</p>

</div>

</div>

</div>

</body>
</html>
